name: Build for microservices

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cart-service:
             - 'CartService/**'
            order-service:
             - 'OrderService/**'
            gateway:
             - 'Gateway/**'

      - name: Service matrix
        id: set-matrix
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          MATRIX=$(echo "$CHANGES" | jq -c 'map(
          if . == "cart-service" then { dir: "CartService", image: "cart-service" }
          elif . == "order-service" then { dir: "OrderService", image: "order-service" }
          elif . == "gateway" then { dir: "Gateway", image: "gateway" }
          else empty
          end)')
          echo "services=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Tests
        working-directory: ${{ matrix.service.dir }}
        run: mvn test

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service.dir }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest